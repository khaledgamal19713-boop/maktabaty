<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتبتي</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --green:#1a6b3c;--green-light:#e8f5ee;--gold:#b8860b;--gold-light:#fdf8e8;
  --blue:#1a3a6b;--blue-light:#e8f0fd;--text:#1a1a1a;--text2:#666;--text3:#999;
  --border:#e0e0e0;--bg:#f7f7f5;--white:#fff;--purple:#6b1ab8;--purple-light:#f3e8fd;
}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5}
a{text-decoration:none;color:inherit}
button{cursor:pointer;border:none;outline:none;font-family:inherit;font-size:14px;background:none}
input,textarea,select{font-family:inherit;font-size:14px;outline:none}
img{max-width:100%}
#nav{background:var(--green);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:50px;position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.15)}
#nav .logo{font-size:19px;font-weight:700;letter-spacing:.5px;flex-shrink:0}
#nav-toggle{display:flex;background:rgba(0,0,0,.15);border-radius:20px;padding:2px;margin:0 12px}
#nav-toggle button{padding:6px 18px;border-radius:18px;color:rgba(255,255,255,.8);font-size:13px;font-weight:600}
#nav-toggle button.active{background:#fff;color:var(--green)}
#nav .nav-user{display:flex;align-items:center;gap:8px;font-size:13px;flex-shrink:0}
#nav .nav-user span{color:rgba(255,255,255,.9);cursor:pointer;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#nav .nav-user button{background:rgba(255,255,255,.15);color:#fff;padding:5px 10px;border-radius:4px;font-size:12px}
#nav .nav-user button:hover{background:rgba(255,255,255,.25)}
#nav-back-btn{background:rgba(255,255,255,.15);color:#fff;padding:5px 12px;border-radius:4px;font-size:12px;display:none;align-items:center;gap:4px}
#nav-back-btn:hover{background:rgba(255,255,255,.25)}
#sub-bar{background:#fff;border-bottom:1px solid var(--border);display:flex;gap:6px;padding:8px 16px;overflow-x:auto;position:sticky;top:50px;z-index:99}
#sub-bar button{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:#fff;font-size:13px;color:var(--text2);white-space:nowrap;flex-shrink:0}
#sub-bar button.active{background:var(--gold);color:#fff;border-color:var(--gold)}
#auth-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px}
#auth-box{background:#fff;border-radius:10px;padding:28px;width:400px;max-width:100%;max-height:92vh;overflow-y:auto}
#auth-box h2{color:var(--green);margin-bottom:18px;font-size:21px;text-align:center}
#auth-tabs{display:flex;margin-bottom:18px;border-bottom:2px solid var(--border)}
#auth-tabs button{flex:1;padding:8px;font-size:14px;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-2px}
#auth-tabs button.active{color:var(--green);border-bottom-color:var(--green);font-weight:600}
.auth-form{display:flex;flex-direction:column;gap:10px}
.auth-form input{border:1px solid var(--border);border-radius:6px;padding:10px 12px;width:100%}
.auth-form input:focus{border-color:var(--green)}
.auth-form .btn-main{background:var(--green);color:#fff;padding:11px;border-radius:6px;font-size:15px;font-weight:600;margin-top:4px}
.auth-form .btn-main:hover{background:#155530}
#auth-msg{font-size:13px;color:#c0392b;text-align:center;min-height:18px;margin-top:6px}
#acc-type-tabs{display:flex;gap:8px;margin-bottom:6px}
.acc-type-card{flex:1;border:2px solid var(--border);border-radius:8px;padding:10px;text-align:center;cursor:pointer;transition:.15s}
.acc-type-card.active{border-color:var(--green);background:var(--green-light)}
.acc-type-card h4{font-size:13px;color:var(--text);margin-bottom:4px}
.acc-type-card p{font-size:11px;color:var(--text2);line-height:1.5}
.field-soon{position:relative}
.field-soon input{background:#f5f5f5;color:#aaa}
.field-soon .soon-badge{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--gold);background:var(--gold-light);padding:2px 8px;border-radius:10px}
#app{display:none}
.page{display:none;min-height:calc(100vh - 50px)}
.page.active{display:block}
#page-feed{max-width:680px;margin:0 auto;padding:16px}
#composer{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:16px}
#guest-notice{font-size:12px;color:var(--gold);background:var(--gold-light);padding:8px 12px;border-radius:6px;margin-bottom:10px}
#post-types{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
#post-types button{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:#fff;font-size:13px;color:var(--text2)}
#post-types button.active{background:var(--green);color:#fff;border-color:var(--green)}
#post-types button:disabled{opacity:.35;cursor:not-allowed}
#post-content{width:100%;border:1px solid var(--border);border-radius:6px;padding:10px;min-height:80px;resize:vertical}
#post-content:focus{border-color:var(--green)}
#composer-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;flex-wrap:wrap;gap:8px}
#composer-footer select{border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:13px}
#btn-publish{background:var(--green);color:#fff;padding:8px 22px;border-radius:6px;font-size:14px}
#btn-publish:hover{background:#155530}
#btn-publish:disabled{background:#aaa}
.post-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px}
.post-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.post-author-row{display:flex;align-items:center;gap:8px}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.post-author{font-weight:600;font-size:14px;color:var(--green);cursor:pointer}
.post-meta{font-size:11px;color:var(--text2);margin-top:1px}
.post-type-badge{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--green-light);color:var(--green);font-weight:600}
.post-type-badge.فائدة{background:var(--blue-light);color:var(--blue)}
.post-type-badge.سؤال{background:#fdf3e8;color:#b85c0b}
.post-type-badge.اقتباس{background:var(--gold-light);color:var(--gold)}
.post-type-badge.تحقيق{background:var(--purple-light);color:var(--purple)}
.post-content{line-height:1.7;font-size:15px;white-space:pre-wrap;margin-bottom:4px}
.post-footer{display:flex;gap:14px;margin-top:10px;padding-top:8px;border-top:1px solid #f3f3f3}
.post-footer button{color:var(--text2);font-size:13px;padding:3px 6px;border-radius:4px}
.post-footer button:hover{background:var(--green-light);color:var(--green)}
.post-footer button.liked{color:var(--green);font-weight:600}
.post-hadith-ref{font-size:12px;color:var(--blue);background:var(--blue-light);padding:3px 10px;border-radius:4px;cursor:pointer}
.post-hadith-ref:hover{text-decoration:underline}
.comments-section{margin-top:10px;border-top:1px solid #f3f3f3;padding-top:8px;display:none}
.comment-item{padding:6px 0;border-bottom:1px solid #f7f7f7;font-size:13px;display:flex;gap:6px}
.comment-author{font-weight:600;color:var(--green);font-size:12px;flex-shrink:0}
.comment-input-row{display:flex;gap:8px;margin-top:8px}
.comment-input-row input{flex:1;border:1px solid var(--border);border-radius:20px;padding:7px 12px;font-size:13px}
.comment-input-row button{background:var(--green);color:#fff;padding:7px 14px;border-radius:20px;font-size:13px}
#posts-loading,#posts-empty{text-align:center;padding:30px;color:var(--text2)}
#page-library{display:flex;height:calc(100vh - 50px);overflow:hidden}
#lib-sidebar{width:64px;min-width:64px;background:#fff;border-left:1px solid var(--border);overflow-y:auto;transition:width .2s;display:flex;flex-direction:column;flex-shrink:0}
#lib-sidebar.expanded{width:200px;min-width:200px}
#sidebar-toggle{padding:10px;text-align:center;border-bottom:1px solid var(--border);color:var(--green);font-size:16px}
#sidebar-toggle:hover{background:var(--green-light)}
.book-item{padding:10px 8px;cursor:pointer;border-bottom:1px solid #f5f5f5;text-align:center;border-right:3px solid transparent}
.book-item:hover{background:var(--green-light)}
.book-item.active{background:var(--green-light);border-right-color:var(--green)}
.book-item .book-icon{font-size:20px;display:block;margin-bottom:2px}
.book-item .book-title{font-size:11px;font-weight:600;color:var(--text);display:none;line-height:1.3}
.book-item .book-author{font-size:10px;color:var(--text2);display:none}
#lib-sidebar.expanded .book-item{text-align:right;padding:10px 12px}
#lib-sidebar.expanded .book-item .book-icon{display:none}
#lib-sidebar.expanded .book-item .book-title,#lib-sidebar.expanded .book-item .book-author{display:block}
#lib-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#lib-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;color:var(--text2);text-align:center}
#lib-empty p:first-child{font-size:32px;margin-bottom:10px}
#mode-bar{background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:8px 14px;flex-wrap:wrap;gap:8px}
#mode-bar .modes{display:flex;gap:6px}
#mode-bar .modes button{padding:6px 16px;border-radius:6px;border:1px solid var(--border);font-size:13px;color:var(--text2)}
#mode-bar .modes button.active{background:var(--green);color:#fff;border-color:var(--green)}
#mode-bar .modes button:disabled{opacity:.4;cursor:not-allowed}
#mode-bar .toc-and-fn{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
#mode-bar select{border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px}
.fn-toggle{padding:4px 10px;border-radius:14px;border:1px solid var(--border);font-size:11px;color:var(--text2)}
.fn-toggle.active.تخريج{background:var(--blue-light);color:var(--blue);border-color:var(--blue)}
.fn-toggle.active.فروق_نسخ{background:var(--gold-light);color:var(--gold);border-color:var(--gold)}
.fn-toggle.active.غريب{background:var(--purple-light);color:var(--purple);border-color:var(--purple)}
#comments-toggle-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);font-size:12px;color:var(--text2)}
#comments-toggle-btn.active{background:var(--green-light);color:var(--green);border-color:var(--green)}
#lib-content{flex:1;display:flex;overflow:hidden;position:relative}
.side-panel{width:0;overflow:hidden;transition:width .2s;background:#fafafa;border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.side-panel.open{width:19%;min-width:170px}
.side-panel-header{padding:8px 10px;font-size:12px;font-weight:600;color:var(--text2);background:#fff;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.side-panel-body{flex:1;overflow-y:auto;padding:8px}
.side-panel-body .ms-item,.side-panel-body .ed-item{border:1px solid var(--border);border-radius:6px;padding:8px;margin-bottom:8px;background:#fff;font-size:12px}
.side-panel-body .ms-item h4,.side-panel-body .ed-item h4{font-size:12px;color:var(--green);margin-bottom:3px}
.side-panel-body .ms-item p,.side-panel-body .ed-item p{font-size:10px;color:var(--text2);line-height:1.5}
.side-panel-body img{width:100%;border-radius:4px;margin-top:6px;cursor:zoom-in}
.add-item-btn{width:100%;padding:6px;border:1px dashed var(--border);border-radius:6px;font-size:11px;color:var(--green);margin-top:4px}
.add-item-btn:hover{background:var(--green-light)}
#panel-toggle-left,#panel-toggle-right{position:absolute;top:8px;z-index:10;background:#fff;border:1px solid var(--border);border-radius:50%;width:28px;height:28px;font-size:13px;color:var(--text2)}
#panel-toggle-left{right:8px}
#panel-toggle-right{left:8px}
#panel-toggle-left.open,#panel-toggle-right.open{background:var(--green-light);color:var(--green)}
#reader-panel{flex:1;overflow-y:auto;padding:18px;min-width:0;background:var(--bg)}
#reader-header{margin-bottom:12px}
#reader-header h2{color:var(--green);font-size:18px;margin-bottom:6px}
#hadith-search-bar{display:flex;gap:8px;margin-bottom:12px}
#hadith-search-bar input{flex:1;border:1px solid var(--border);border-radius:6px;padding:8px 12px}
#hadith-search-bar button{background:var(--green);color:#fff;padding:8px 16px;border-radius:6px}
.hadith-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px}
.hadith-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.hadith-number{font-size:12px;color:var(--text2)}
.hadith-grade{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.hadith-grade.صحيح{background:var(--green-light);color:var(--green)}
.hadith-grade.حسن{background:var(--blue-light);color:var(--blue)}
.hadith-grade.ضعيف{background:#fde8e8;color:#b81a1a}
.hadith-text{line-height:2;font-size:15px}
.fn-marker{display:inline-block;font-size:11px;font-weight:700;color:#fff;border-radius:3px;padding:0 4px;margin:0 2px;cursor:pointer;vertical-align:super}
.fn-marker.تخريج{background:var(--blue)}
.fn-marker.فروق_نسخ{background:var(--gold)}
.fn-marker.غريب{background:var(--purple)}
.hadith-actions{display:flex;gap:8px;margin-top:10px;padding-top:8px;border-top:1px solid #f0f0f0;flex-wrap:wrap}
.hadith-actions button{background:var(--green-light);color:var(--green);padding:5px 12px;border-radius:4px;font-size:12px}
.hadith-actions button:hover{background:var(--green);color:#fff}
.hadith-actions .btn-tahqiq{background:var(--purple-light);color:var(--purple)}
.hadith-actions .btn-tahqiq:hover{background:var(--purple);color:#fff}
.hadith-actions .btn-editor{background:var(--gold-light);color:var(--gold)}
.hadith-actions .btn-editor:hover{background:var(--gold);color:#fff}
#fn-popover{position:fixed;background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;max-width:280px;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:400;display:none}
#fn-popover .fn-cat-label{font-size:11px;font-weight:700;margin-bottom:4px}
#fn-popover .fn-cat-label.تخريج{color:var(--blue)}
#fn-popover .fn-cat-label.فروق_نسخ{color:var(--gold)}
#fn-popover .fn-cat-label.غريب{color:var(--purple)}
#comments-drawer{width:0;overflow:hidden;transition:width .2s;background:#fff;border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
#comments-drawer.open{width:280px;min-width:240px}
#comments-drawer-header{padding:10px 12px;font-size:13px;font-weight:600;color:var(--green);border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
#comments-drawer-body{flex:1;overflow-y:auto;padding:10px}
#comments-drawer-input{padding:10px;border-top:1px solid var(--border);display:flex;gap:6px}
#comments-drawer-input input{flex:1;border:1px solid var(--border);border-radius:18px;padding:7px 12px;font-size:13px}
#comments-drawer-input button{background:var(--green);color:#fff;padding:7px 14px;border-radius:18px;font-size:12px}
#editor-toolbar{padding:6px 10px;border-bottom:1px solid var(--border);display:flex;gap:3px;flex-wrap:wrap;background:#f9f9f9;align-items:center;flex-shrink:0}
#editor-toolbar button{padding:4px 7px;border:1px solid transparent;border-radius:4px;background:none;font-size:13px;color:var(--text);min-width:26px;text-align:center;line-height:1.2}
#editor-toolbar button:hover{background:var(--green-light);border-color:var(--border);color:var(--green)}
#editor-toolbar select{border:1px solid var(--border);border-radius:4px;padding:3px 5px;font-size:12px;background:#fff;max-width:95px}
#editor-toolbar button:hover{background:var(--green-light);border-color:var(--green);color:var(--green)}
#editor-toolbar .sep{width:1px;background:var(--border);align-self:stretch;margin:0 2px}
#editor-toolbar .status-badge{font-size:11px;padding:3px 10px;border-radius:10px;margin-right:auto}
.status-draft{background:#f0f0f0;color:var(--text2)}
.status-pending_review{background:var(--gold-light);color:var(--gold)}
.status-approved{background:var(--green-light);color:var(--green)}
#editor-content{min-height:200px;line-height:2.1;font-size:15px;outline:none;direction:rtl;background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px}
#editor-content:empty:before{content:'اختر حديثاً من وضع التصفح أولاً.';color:#bbb}
.m-fn-ref{background:var(--gold-light);color:var(--gold);border-radius:3px;padding:0 4px;font-size:11px;font-weight:700;vertical-align:super;cursor:pointer}
#editor-footnotes{margin-top:14px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px}
#editor-footnotes h5{font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:600}
.fn-item{display:flex;gap:8px;font-size:12px;margin-bottom:6px;align-items:flex-start;padding-bottom:6px;border-bottom:1px solid #f5f5f5}
.fn-num{color:var(--gold);font-weight:700;min-width:18px}
.fn-text{flex:1;line-height:1.6}
.fn-del{color:#c0392b;font-size:14px;padding:0 4px}
.fn-del:hover{color:#e74c3c}
#btn-add-fn{color:var(--green);font-size:12px;padding:6px 0}
#btn-add-fn:hover{text-decoration:underline}
.mark-btn.tashif{color:#c0392b!important}
.mark-btn.ziyada{color:var(--green)!important}
.mark-btn.naqs{color:#e67e22!important}
.mark-btn.shahid{color:var(--blue)!important}
.m-tashif{background:#fde8e8;color:#c0392b;padding:0 2px;border-radius:2px}
.m-ziyada{background:var(--green-light);color:var(--green);padding:0 2px;border-radius:2px}
.m-naqs{background:#fdf3e8;color:#e67e22;padding:0 2px;border-radius:2px}
.m-shahid{background:var(--blue-light);color:var(--blue);padding:0 2px;border-radius:2px}
#editor-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
#editor-actions button{padding:9px 18px;border-radius:6px;font-size:13px}
.btn-save{background:#f0f0f0;color:var(--text)}
.btn-submit{background:var(--green);color:#fff}
.btn-submit:hover{background:#155530}
#page-profile{max-width:680px;margin:0 auto;padding:16px}
#profile-header{background:#fff;border:1px solid var(--border);border-radius:8px;padding:18px;margin-bottom:16px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
#profile-header .avatar{width:60px;height:60px;font-size:24px}
#profile-info h2{color:var(--green);font-size:18px;margin-bottom:4px}
#profile-info .acc-badge{font-size:11px;padding:2px 10px;border-radius:10px;background:var(--green-light);color:var(--green);margin-right:6px}
#profile-info .acc-badge.guest{background:#f0f0f0;color:var(--text2)}
#profile-info p{font-size:13px;color:var(--text2);margin-top:6px}
#profile-bio-edit{margin-top:8px;display:flex;gap:6px}
#profile-bio-edit input{flex:1;border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px}
#profile-bio-edit button{background:var(--green);color:#fff;padding:6px 14px;border-radius:6px;font-size:12px}
#profile-tabs{display:flex;gap:6px;margin-bottom:14px;border-bottom:1px solid var(--border)}
#profile-tabs button{padding:8px 16px;font-size:13px;color:var(--text2);border-bottom:2px solid transparent}
#profile-tabs button.active{color:var(--green);border-bottom-color:var(--green);font-weight:600}
.tahqiq-item{background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px}
.tahqiq-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.tahqiq-item h4{font-size:13px;color:var(--green)}
.tahqiq-item .preview{font-size:13px;color:var(--text2);line-height:1.7;max-height:60px;overflow:hidden}
.status-pill{font-size:11px;padding:2px 10px;border-radius:10px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#fff;border-radius:8px;padding:22px;width:460px;max-width:100%;max-hei
