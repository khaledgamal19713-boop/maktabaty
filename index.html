<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتبتي</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --green:#1a6b3c;--green-light:#e8f5ee;--gold:#b8860b;--gold-light:#fdf8e8;
  --blue:#1a3a6b;--blue-light:#e8f0fd;--text:#1a1a1a;--text2:#666;--text3:#999;
  --border:#e0e0e0;--bg:#f7f7f5;--white:#fff;--purple:#6b1ab8;--purple-light:#f3e8fd;
}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5}
a{text-decoration:none;color:inherit}
button{cursor:pointer;border:none;outline:none;font-family:inherit;font-size:14px;background:none}
input,textarea,select{font-family:inherit;font-size:14px;outline:none}
img{max-width:100%}
#nav{background:var(--green);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:50px;position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.15)}
#nav .logo{font-size:19px;font-weight:700;letter-spacing:.5px;flex-shrink:0}
#nav-toggle{display:flex;background:rgba(0,0,0,.15);border-radius:20px;padding:2px;margin:0 12px}
#nav-toggle button{padding:6px 18px;border-radius:18px;color:rgba(255,255,255,.8);font-size:13px;font-weight:600}
#nav-toggle button.active{background:#fff;color:var(--green)}
#nav .nav-user{display:flex;align-items:center;gap:8px;font-size:13px;flex-shrink:0}
#nav .nav-user span{color:rgba(255,255,255,.9);cursor:pointer;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#nav .nav-user button{background:rgba(255,255,255,.15);color:#fff;padding:5px 10px;border-radius:4px;font-size:12px}
#nav .nav-user button:hover{background:rgba(255,255,255,.25)}
#nav-back-btn{background:rgba(255,255,255,.15);color:#fff;padding:5px 12px;border-radius:4px;font-size:12px;display:none;align-items:center;gap:4px}
#nav-back-btn:hover{background:rgba(255,255,255,.25)}
#sub-bar{background:#fff;border-bottom:1px solid var(--border);display:flex;gap:6px;padding:8px 16px;overflow-x:auto;position:sticky;top:50px;z-index:99}
#sub-bar button{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:#fff;font-size:13px;color:var(--text2);white-space:nowrap;flex-shrink:0}
#sub-bar button.active{background:var(--gold);color:#fff;border-color:var(--gold)}
#auth-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px}
#auth-box{background:#fff;border-radius:10px;padding:28px;width:400px;max-width:100%;max-height:92vh;overflow-y:auto}
#auth-box h2{color:var(--green);margin-bottom:18px;font-size:21px;text-align:center}
#auth-tabs{display:flex;margin-bottom:18px;border-bottom:2px solid var(--border)}
#auth-tabs button{flex:1;padding:8px;font-size:14px;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-2px}
#auth-tabs button.active{color:var(--green);border-bottom-color:var(--green);font-weight:600}
.auth-form{display:flex;flex-direction:column;gap:10px}
.auth-form input{border:1px solid var(--border);border-radius:6px;padding:10px 12px;width:100%}
.auth-form input:focus{border-color:var(--green)}
.auth-form .btn-main{background:var(--green);color:#fff;padding:11px;border-radius:6px;font-size:15px;font-weight:600;margin-top:4px}
.auth-form .btn-main:hover{background:#155530}
#auth-msg{font-size:13px;color:#c0392b;text-align:center;min-height:18px;margin-top:6px}
#acc-type-tabs{display:flex;gap:8px;margin-bottom:6px}
.acc-type-card{flex:1;border:2px solid var(--border);border-radius:8px;padding:10px;text-align:center;cursor:pointer;transition:.15s}
.acc-type-card.active{border-color:var(--green);background:var(--green-light)}
.acc-type-card h4{font-size:13px;color:var(--text);margin-bottom:4px}
.acc-type-card p{font-size:11px;color:var(--text2);line-height:1.5}
.field-soon{position:relative}
.field-soon input{background:#f5f5f5;color:#aaa}
.field-soon .soon-badge{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--gold);background:var(--gold-light);padding:2px 8px;border-radius:10px}
#app{display:none}
.page{display:none;min-height:calc(100vh - 50px)}
.page.active{display:block}
#page-feed{max-width:680px;margin:0 auto;padding:16px}
#composer{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:16px}
#guest-notice{font-size:12px;color:var(--gold);background:var(--gold-light);padding:8px 12px;border-radius:6px;margin-bottom:10px}
#post-types{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
#post-types button{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:#fff;font-size:13px;color:var(--text2)}
#post-types button.active{background:var(--green);color:#fff;border-color:var(--green)}
#post-types button:disabled{opacity:.35;cursor:not-allowed}
#post-content{width:100%;border:1px solid var(--border);border-radius:6px;padding:10px;min-height:80px;resize:vertical}
#post-content:focus{border-color:var(--green)}
#composer-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;flex-wrap:wrap;gap:8px}
#composer-footer select{border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:13px}
#btn-publish{background:var(--green);color:#fff;padding:8px 22px;border-radius:6px;font-size:14px}
#btn-publish:hover{background:#155530}
#btn-publish:disabled{background:#aaa}
.post-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px}
.post-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.post-author-row{display:flex;align-items:center;gap:8px}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.post-author{font-weight:600;font-size:14px;color:var(--green);cursor:pointer}
.post-meta{font-size:11px;color:var(--text2);margin-top:1px}
.post-type-badge{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--green-light);color:var(--green);font-weight:600}
.post-type-badge.فائدة{background:var(--blue-light);color:var(--blue)}
.post-type-badge.سؤال{background:#fdf3e8;color:#b85c0b}
.post-type-badge.اقتباس{background:var(--gold-light);color:var(--gold)}
.post-type-badge.تحقيق{background:var(--purple-light);color:var(--purple)}
.post-content{line-height:1.7;font-size:15px;white-space:pre-wrap;margin-bottom:4px}
.post-footer{display:flex;gap:14px;margin-top:10px;padding-top:8px;border-top:1px solid #f3f3f3}
.post-footer button{color:var(--text2);font-size:13px;padding:3px 6px;border-radius:4px}
.post-footer button:hover{background:var(--green-light);color:var(--green)}
.post-footer button.liked{color:var(--green);font-weight:600}
.post-menu{position:relative}
.post-menu-btn{color:var(--text2);font-size:20px;padding:0 6px;line-height:1;border-radius:4px}
.post-menu-btn:hover{background:var(--green-light);color:var(--green)}
.post-menu-dropdown{position:absolute;left:0;top:28px;background:#fff;border:1px solid var(--border);border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.15);min-width:120px;z-index:50;display:none;overflow:hidden}
.post-menu-dropdown.open{display:block}
.post-menu-dropdown button{display:block;width:100%;text-align:right;padding:9px 14px;font-size:13px;color:var(--text)}
.post-menu-dropdown button:hover{background:var(--green-light)}
.post-menu-dropdown .danger{color:#c0392b}
.post-menu-dropdown .danger:hover{background:#fde8e8}
.post-edit-box{margin-top:8px}
.post-edit-box textarea{width:100%;border:1px solid var(--border);border-radius:6px;padding:10px;min-height:80px;font-size:15px;line-height:1.7;resize:vertical}
.post-edit-actions{display:flex;gap:8px;margin-top:6px}
.post-edit-actions button{padding:6px 16px;border-radius:6px;font-size:13px}
.post-hadith-ref{font-size:12px;color:var(--blue);background:var(--blue-light);padding:3px 10px;border-radius:4px;cursor:pointer}
.post-hadith-ref:hover{text-decoration:underline}
.comments-section{margin-top:10px;border-top:1px solid #f3f3f3;padding-top:8px;display:none}
.comment-item{padding:6px 0;border-bottom:1px solid #f7f7f7;font-size:13px;display:flex;gap:6px}
.comment-author{font-weight:600;color:var(--green);font-size:12px;flex-shrink:0}
.comment-input-row{display:flex;gap:8px;margin-top:8px}
.comment-input-row input{flex:1;border:1px solid var(--border);border-radius:20px;padding:7px 12px;font-size:13px}
.comment-input-row button{background:var(--green);color:#fff;padding:7px 14px;border-radius:20px;font-size:13px}
#posts-loading,#posts-empty{text-align:center;padding:30px;color:var(--text2)}
