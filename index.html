<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبتي | البيئة المعرفية المتكاملة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <style>
        :root {
            --green: #1a6b3c; --green-light: #e8f5ee;
            --gold: #b8860b; --gold-light: #fdf8e8;
            --text: #1a1a1a; --text2: #666;
            --border: #e0e0e0; --bg: #f7f7f5;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        #nav { background: var(--green); color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 50px; position: sticky; top: 0; z-index: 100; }
        #nav .logo { font-size: 19px; font-weight: 700; }
        #nav-toggle button { padding: 6px 18px; border: none; background: transparent; color: #fff; cursor: pointer; }
        #nav-toggle button.active { background: #fff; color: var(--green); border-radius: 20px; }

        .page { display: none; padding: 20px; }
        .page.active { display: block; }

        #page-library { padding: 0; height: calc(100vh - 50px); display: flex; }
        #pane-a { width: 65px; background: #fff; border-left: 1px solid var(--border); overflow-y: auto; transition: width 0.3s; }
        #pane-a:hover { width: 200px; }
        #lib-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #mode-bar { height: 45px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; background: #fff; gap: 10px; }

        #lib-content { flex: 1; display: flex; overflow: hidden; }
        #pane-b { flex: 1; overflow-y: auto; padding: 20px; }
        .side-panel { width: 0; overflow: hidden; transition: width 0.3s; background: #fafafa; border-left: 1px solid var(--border); }
        .side-panel.open { width: 25%; min-width: 250px; }

        .hadith-card { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .hadith-text { font-size: 18px; line-height: 1.8; }
        .post-card { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 15px; }

        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 8px 16px; border-radius: 20px; display: none; z-index: 1000; }
        .btn-gold { background: var(--gold); color: #fff; }
    </style>
</head>
<body>

<div id="auth-page" style="display:none; padding:100px 20px; text-align:center;">
    <h3>مكتبتي - نظام المعرفة</h3>
    <input id="auth-email" type="email" placeholder="البريد الإلكتروني" class="form-control mx-auto my-3" style="max-width:300px;">
    <button onclick="login()" class="btn btn-success">دخول</button>
</div>

<div id="app" style="display:none;">
    <nav id="nav">
        <div class="logo">مكتبتي</div>
        <div id="nav-toggle">
            <button id="btn-feed" class="active" onclick="switchView('feed')">الخلاصة</button>
            <button id="btn-lib" onclick="switchView('library')">المكتبة</button>
        </div>
        <div id="nav-user" style="font-size:13px;"><span id="username"></span> | <a href="#" onclick="logout()" style="color:#fff;">خروج</a></div>
    </nav>

    <div id="page-feed" class="page active" style="max-width:700px; margin:0 auto;">
        <div class="post-card">
            <textarea id="post-content" class="form-control mb-2" placeholder="اكتب فائدة علمية..."></textarea>
            <button onclick="publishPost()" class="btn btn-gold">نشر</button>
        </div>
        <div id="posts-list"></div>
    </div>

    <div id="page-library" class="page">
        <div id="pane-a">
            <div id="books-list" class="p-2"></div>
        </div>
        <div id="lib-main">
            <div id="mode-bar">
                <button class="btn btn-sm btn-outline-success" onclick="setLayer('browsing')">تصفح</button>
                <button class="btn btn-sm btn-outline-warning" onclick="setLayer('editor')">تحقيق</button>
                <span id="current-book-title" class="ms-auto fw-bold text-success"></span>
            </div>
            <div id="lib-content">
                <div id="pane-b">
                    <div id="hadiths-container"></div>
                </div>
                <div id="pane-c" class="side-panel">
                    <div class="p-3"><h6>🧠 الذكاء السياقي</h6><div id="intel-content"></div></div>
                </div>
                <div id="pane-d" class="side-panel">
                    <div class="p-3"><h6>📁 مساحة البحث</h6><div id="editor-content"></div></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
    const SUPA_URL='https://uqfqpqjarofbcdzkrdgs.supabase.co';
    const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxZnFwcWphcm9mYmNkemtyZGdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4ODUwMzUsImV4cCI6MjA5MzQ2MTAzNX0.8z2Nc8t14txttepiRV5yhhkBfDdE77FJ7rx1dxQrICI';
    const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

    let user = null, layer = 'browsing', book = null;

    async function init() {
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
            user = session.user;
            document.getElementById('app').style.display = 'block';
            const { data: prof } = await sb.from('profiles').select('full_name').eq('id', user.id).single();
            document.getElementById('username').textContent = prof?.full_name || 'باحث';
            loadPosts();
            renderBooks();
        } else {
            document.getElementById('auth-page').style.display = 'block';
        }
    }

    function switchView(v) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + v).classList.add('active');
        document.querySelectorAll('#nav-toggle button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + (v === 'feed' ? 'feed' : 'lib')).classList.add('active');
    }

    function renderBooks() {
        const books = [{id:'bukhari', title:'صحيح البخاري', icon:'📗'}, {id:'muslim', title:'صحيح مسلم', icon:'📘'}];
        document.getElementById('books-list').innerHTML = books.map(b => `<div class="p-2 border-bottom pointer" onclick="selectBook('${b.id}', '${b.title}')">${b.icon} ${b.title}</div>`).join('');
    }

    async function selectBook(id, title) {
        book = id;
        document.getElementById('current-book-title').textContent = title;
        const { data } = await sb.from('hadiths').select('*').eq('book_id', id).limit(50);
        document.getElementById('hadiths-container').innerHTML = data.map(h => `
            <div class="hadith-card" id="h-${h.hadithnumber}">
                <div class="hadith-text" id="htext-${h.hadithnumber}">${h.text}</div>
                <div class="mt-2">
                    <button class="btn btn-sm btn-outline-warning editor-only" style="display:none;" onclick="openEditor('${h.hadithnumber}')">🛠 تحرير</button>
                    <div class="sandbox-ind text-warning" style="display:none; font-size:12px;">✨ مسودة شخصية</div>
                </div>
            </div>
        `).join('');
        applySandbox();
    }

    function setLayer(l) {
        layer = l;
        document.querySelectorAll('.side-panel').forEach(p => p.classList.toggle('open', l !== 'browsing'));
        document.querySelectorAll('.editor-only').forEach(b => b.style.display = (l === 'editor' ? 'inline-block' : 'none'));
        showToast('الطبقة الحالية: ' + (l==='browsing'?'تصفح':'تحقيق'));
    }

    async function openEditor(num) {
        const text = document.getElementById('htext-' + num).innerText;
        const pane = document.getElementById('pane-d');
        pane.classList.add('open');
        pane.innerHTML = `
            <div class="p-3">
                <h6>📝 محرر المحقق - حديث ${num}</h6>
                <textarea id="edit-area-${num}" class="form-control mb-2" style="height:250px; font-family:'Amiri', serif; font-size:18px; direction:rtl;">${text}</textarea>
                <div class="mb-2 d-flex gap-2">
                    <button class="btn btn-sm btn-outline-info" onclick="insertFN('${num}')">📑 حاشية</button>
                    <button class="btn btn-sm btn-outline-success" onclick="startTakhrij('${num}')">🔍 تخريج</button>
                    <button class="btn btn-sm btn-outline-warning" onclick="showChain('${num}')">⛓️ إسناد</button>
                </div>
                <button onclick="saveEdit('${num}')" class="btn btn-gold w-100">💾 حفظ المسودة</button>
            </div>
        `;
    }

    window.insertFN = function(num) {
        const ta = document.getElementById('edit-area-' + num);
        const start = ta.selectionStart;
        const end = ta.selectionEnd;
        const text = ta.value;
        const count = (text.match(/\[\d+\]/g) || []).length + 1;
        ta.value = text.substring(0, start) + `[${count}]` + text.substring(end);
        ta.focus();
    }

    async function saveEdit(num) {
        const newText = document.getElementById('edit-area-' + num).value;
        await sb.from('user_edits').upsert({ user_id: user.id, book_id: book, hadith_number: num, edited_matn: newText });
        showToast('تم حفظ المسودة بنجاح');
        applySandbox();
    }

    async function applySandbox() {
        if (!user || !book) return;
        const { data } = await sb.from('user_edits').select('*').eq('user_id', user.id).eq('book_id', book);
        data?.forEach(e => {
            const el = document.getElementById('htext-' + e.hadith_number);
            if (el) {
                el.innerHTML = e.edited_matn;
                const card = document.getElementById('h-' + e.hadith_number);
                if (card) card.querySelector('.sandbox-ind').style.display = 'block';
            }
        });
    }

    async function loadPosts() {
        const { data } = await sb.from('posts').select('*, profiles(full_name)').order('created_at', { ascending: false });
        document.getElementById('posts-list').innerHTML = data.map(p => `
            <div class="post-card">
                <div class="fw-bold mb-1">${p.profiles?.full_name || 'باحث'}</div>
                <div>${p.content}</div>
            </div>
        `).join('');
    }

    async function publishPost() {
        const c = document.getElementById('post-content').value;
        if (!c) return;
        await sb.from('posts').insert({ author_id: user.id, content: c });
        document.getElementById('post-content').value = '';
        loadPosts();
        showToast('تم النشر');
    }

    function showToast(m) {
        const t = document.getElementById('toast');
        t.textContent = m; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    async function login() {
        const email = document.getElementById('auth-email').value;
        const { error } = await sb.auth.signInWithOtp({ email });
        if (error) alert(error.message); else alert('تفقد بريدك الإلكتروني!');
    }

    async function logout() { await sb.auth.signOut(); location.reload(); }

    async function showChain(hNum) {
        const pane = document.getElementById('pane-c');
        pane.classList.add('open');
        pane.innerHTML = `<div class="p-3"><h6>⛓️ سلسلة الإسناد: حديث ${hNum}</h6><p style="font-size:12px; color:gray;">جاري استخراج السلسلة آلياً...</p></div>`;
    }

    async function startTakhrij(hNum) {
        showToast('جاري التخريج والبحث عن الشواهد...');
    }

    init();
</script>
</body>
</html>
