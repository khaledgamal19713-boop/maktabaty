<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>أداة الربط التفاعلي — أجناس علل الحديث</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { 
  font-family: 'Tajawal', 'Segoe UI', sans-serif; 
  background: #1B241F; 
  color: #F4ECDA;
  height: 100vh;
  overflow: hidden;
}

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-thumb { background: #31413A; border-radius: 3px; }

:root {
  --ink: #1B241F;
  --ink-soft: #232F28;
  --ink-line: #31413A;
  --brass: #BB9257;
  --brass-dark: #8C6C34;
  --sage: #748A6E;
  --ai-accent: #5C7A99;
  --parchment: #F4ECDA;
  --parchment-dim: #B9AF95;
  --burgundy: #8C3F35;
}

.app-wrapper { display: flex; flex-direction: column; height: 100vh; }

.app-header {
  height: 15vh; min-height: 120px; background: var(--ink-soft);
  border-bottom: 2px solid var(--brass); display: flex;
  flex-direction: column; padding: 12px 20px; flex-shrink: 0; gap: 10px;
}
.header-top { display: flex; align-items: center; justify-content: space-between; }
.app-title { font-family: 'Amiri', serif; font-size: 1.25rem; font-weight: 700; color: var(--brass); }
.app-subtitle { font-size: 0.8rem; color: var(--parchment-dim); }
.header-books { display: flex; gap: 10px; align-items: center; }

.dropdown { position: relative; }
.dropdown-btn {
  padding: 8px 16px; border-radius: 6px; border: 1px solid var(--brass);
  background: var(--ink); color: var(--brass); font-size: 0.82rem;
  font-weight: 700; cursor: pointer; font-family: inherit;
  transition: all 0.2s; display: flex; align-items: center; gap: 8px;
}
.dropdown-btn:hover { background: var(--brass); color: var(--ink); }
.dropdown-menu {
  position: absolute; top: calc(100% + 6px); right: 0;
  background: var(--ink-soft); border: 1px solid var(--ink-line);
  border-radius: 8px; padding: 8px; min-width: 220px; z-index: 100;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4); display: none;
}
.dropdown.open .dropdown-menu { display: block; }
.dropdown-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: 5px; cursor: pointer;
  font-size: 0.8rem; transition: all 0.15s;
}
.dropdown-item:hover { background: rgba(187, 146, 87, 0.1); }
.dropdown-item input { width: 14px; height: 14px; accent-color: var(--brass); }

.header-actions { display: flex; gap: 10px; align-items: center; margin-top: auto; }
.header-btn {
  padding: 8px 18px; border-radius: 6px; border: 1px solid var(--brass);
  background: transparent; color: var(--brass); font-size: 0.82rem;
  font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.2s;
}
.header-btn:hover { background: var(--brass); color: var(--ink); }
.header-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.issue-counter {
  padding: 6px 14px; background: var(--ink); border: 1px solid var(--ink-line);
  border-radius: 6px; font-size: 0.82rem; color: var(--parchment);
}

.app-body {
  flex: 1; display: grid;
  grid-template-columns: 20% 5% 35% 5% 35%;
  overflow: hidden; min-height: 0;
}

.field {
  display: flex; flex-direction: column; overflow: hidden;
  background: var(--ink); border-left: 1px solid var(--ink-line);
}
.field:first-child { border-left: none; }

.field-header {
  padding: 10px 14px; background: var(--ink-soft);
  border-bottom: 1px solid var(--ink-line);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.field-title { font-family: 'Amiri', serif; font-size: 1rem; font-weight: 700; color: var(--brass); }
.field-count { font-size: 0.7rem; color: var(--parchment-dim); background: var(--ink); padding: 2px 8px; border-radius: 10px; }
.field-content { flex: 1; overflow-y: auto; padding: 10px; }

.wall {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 24px; background: var(--ink-soft);
  position: relative; border-left: 2px solid var(--ink-line); border-right: 2px solid var(--ink-line);
}
.wall::before {
  content: ''; position: absolute; top: 8%; bottom: 8%; width: 2px;
  background: linear-gradient(to bottom, transparent, var(--ink-line), var(--brass), var(--ink-line), transparent);
}

.arrow-btn {
  width: 80%; min-width: 36px; height: 80px; border-radius: 10px;
  border: 2px solid var(--brass); background: var(--ink); color: var(--brass);
  cursor: pointer; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 6px;
  transition: all 0.3s ease; position: relative; z-index: 1;
  font-family: inherit; padding: 6px 4px;
}
.arrow-btn:hover { background: var(--brass); color: var(--ink); transform: scale(1.05); box-shadow: 0 0 18px rgba(187, 146, 87, 0.4); }
.arrow-btn.active { background: var(--brass); color: var(--ink); box-shadow: 0 0 14px rgba(187, 146, 87, 0.5); }
.arrow-btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none; box-shadow: none; border-color: var(--ink-line); color: var(--parchment-dim); }

.arrow-triangle { width: 0; height: 0; border-style: solid; transition: all 0.3s ease; }
.arrow-triangle.left { border-width: 10px 14px 10px 0; border-color: transparent var(--brass) transparent transparent; }
.arrow-btn:hover .arrow-triangle.left, .arrow-btn.active .arrow-triangle.left { border-color: transparent var(--ink) transparent transparent; }
.arrow-triangle.right { border-width: 10px 0 10px 14px; border-color: transparent transparent transparent var(--brass); }
.arrow-btn:hover .arrow-triangle.right, .arrow-btn.active .arrow-triangle.right { border-color: transparent transparent transparent var(--ink); }
.arrow-btn:disabled .arrow-triangle.left { border-color: transparent var(--parchment-dim) transparent transparent; }
.arrow-btn:disabled .arrow-triangle.right { border-color: transparent transparent transparent var(--parchment-dim); }

.arrow-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.5px; text-align: center; line-height: 1.3; }

.app-footer {
  height: 10vh; min-height: 60px; background: var(--ink-soft);
  border-top: 1px solid var(--ink-line);
  display: grid; grid-template-columns: 20% 5% 35% 5% 35%;
  align-items: center; padding: 0; flex-shrink: 0;
}
.footer-search { padding: 0 12px; display: flex; align-items: center; height: 100%; }
.footer-search input {
  width: 100%; padding: 8px 12px; background: var(--ink);
  border: 1px solid var(--ink-line); border-radius: 6px;
  color: var(--parchment); font-size: 0.82rem; font-family: inherit;
}
.footer-search input::placeholder { color: var(--parchment-dim); }
.footer-search input:focus { outline: none; border-color: var(--brass); }
.footer-wall { display: flex; align-items: center; justify-content: center; background: var(--ink-soft); border-left: 2px solid var(--ink-line); border-right: 2px solid var(--ink-line); height: 100%; }

.tree-node { margin-right: 5px; border-right: 2px solid var(--ink-line); padding-right: 10px; }
.tree-node-content {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 7px; border-radius: 6px; cursor: pointer;
  transition: all 0.2s; margin-bottom: 3px;
}
.tree-node-content:hover { background: rgba(187, 146, 87, 0.08); }
.tree-node-content.selected { background: rgba(187, 146, 87, 0.18); border: 1px solid var(--brass); }
.tree-toggle { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; color: var(--brass); cursor: pointer; transition: transform 0.25s; flex-shrink: 0; }
.tree-toggle.expanded { transform: rotate(90deg); }
.tree-label { font-size: 0.8rem; color: var(--parchment); line-height: 1.45; }
.tree-desc { font-size: 0.65rem; color: var(--parchment-dim); margin-top: 1px; }
.linked-badge { display: inline-flex; align-items: center; gap: 2px; font-size: 0.58rem; padding: 1px 4px; background: var(--sage); color: var(--ink); border-radius: 3px; margin-left: 4px; font-weight: 700; }

.item-card { background: var(--ink-soft); border: 1px solid var(--ink-line); border-radius: 8px; padding: 10px; margin-bottom: 6px; cursor: pointer; transition: all 0.2s; }
.item-card:hover { border-color: var(--brass); }
.item-card.selected { border-color: var(--brass); background: rgba(187, 146, 87, 0.1); }
.item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
.item-number { font-size: 0.72rem; color: var(--brass); font-weight: 700; }
.item-text { font-size: 0.82rem; line-height: 1.65; color: var(--parchment); }
.item-meta { font-size: 0.68rem; color: var(--parchment-dim); margin-top: 3px; }

.analysis-panel { margin-top: 6px; padding: 8px; background: var(--ink); border-radius: 6px; border-right: 3px solid var(--ai-accent); }
.analysis-header { font-size: 0.72rem; color: var(--ai-accent); font-weight: 700; display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; padding: 2px 0; }
.analysis-body { font-size: 0.78rem; line-height: 1.55; color: var(--parchment-dim); margin-top: 5px; }
.analysis-reason { padding: 5px 8px; background: rgba(92, 122, 153, 0.08); border-radius: 4px; margin: 3px 0; font-size: 0.72rem; border-right: 2px solid var(--ai-accent); }
.confidence-badge { display: inline-flex; align-items: center; gap: 3px; padding: 1px 6px; border-radius: 10px; font-size: 0.65rem; font-weight: 700; }
.conf-high { background: rgba(116, 138, 110, 0.2); color: var(--sage); }
.conf-med { background: rgba(187, 146, 87, 0.2); color: var(--brass); }
.conf-low { background: rgba(140, 63, 53, 0.2); color: #C4756A; }

.checkbox-row { display: flex; align-items: flex-start; gap: 7px; cursor: pointer; padding: 2px 0; }
.checkbox-row input { width: 14px; height: 14px; accent-color: var(--brass); margin-top: 3px; flex-shrink: 0; }

.ai-thinking { display: flex; align-items: center; gap: 8px; padding: 7px 10px; background: rgba(92, 122, 153, 0.1); border-radius: 6px; margin-bottom: 10px; }
.ai-dots { display: flex; gap: 4px; }
.ai-dots span { width: 5px; height: 5px; background: var(--ai-accent); border-radius: 50%; animation: pulse 1.4s infinite; }
.ai-dots span:nth-child(2) { animation-delay: 0.2s; }
.ai-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1); } }

.toast {
  position: fixed; bottom: 18px; left: 50%;
  transform: translateX(-50%); padding: 10px 20px;
  background: var(--brass-dark); color: var(--parchment);
  border-radius: 8px; font-size: 0.85rem; z-index: 1000;
  animation: fadeUp 0.3s ease; white-space: nowrap;
}
@keyframes fadeUp { from { opacity: 0; transform: translateX(-50%) translateY(12px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

.action-bar { padding: 7px; background: var(--ink-soft); border-top: 1px solid var(--ink-line); display: flex; gap: 6px; justify-content: center; }
.btn { padding: 6px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.8rem; font-weight: 700; transition: all 0.2s; font-family: inherit; }
.btn-primary { background: var(--brass); color: var(--ink); }
.btn-primary:hover { background: var(--brass-dark); }
.btn-secondary { background: transparent; color: var(--brass); border: 1px solid var(--brass); }

.empty-state { text-align: center; padding: 30px 12px; color: var(--parchment-dim); font-size: 0.82rem; }

.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 2000; display: flex; align-items: center; justify-content: center; }
.modal-content { background: var(--ink-soft); border: 2px solid var(--brass); border-radius: 12px; padding: 20px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--ink-line); }
.modal-title { font-family: 'Amiri', serif; font-size: 1.1rem; color: var(--brass); font-weight: 700; }
.modal-close { background: none; border: none; color: var(--parchment-dim); font-size: 1.5rem; cursor: pointer; line-height: 1; }
.modal-close:hover { color: var(--brass); }
.modal-input { width: 100%; padding: 10px 12px; background: var(--ink); border: 1px solid var(--ink-line); border-radius: 6px; color: var(--parchment); font-size: 0.9rem; font-family: inherit; margin-bottom: 10px; }
.modal-input:focus { outline: none; border-color: var(--brass); }
.modal-textarea { width: 100%; min-height: 80px; padding: 10px 12px; background: var(--ink); border: 1px solid var(--ink-line); border-radius: 6px; color: var(--parchment); font-size: 0.85rem; font-family: inherit; resize: vertical; margin-bottom: 10px; }
.modal-textarea:focus { outline: none; border-color: var(--brass); }
.modal-select { width: 100%; padding: 10px 12px; background: var(--ink); border: 1px solid var(--ink-line); border-radius: 6px; color: var(--parchment); font-size: 0.9rem; font-family: inherit; margin-bottom: 10px; }
.modal-select:focus { outline: none; border-color: var(--brass); }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px; }

.book-repo-item { background: var(--ink); border: 1px solid var(--ink-line); border-radius: 8px; padding: 12px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; }
.book-repo-item:hover { border-color: var(--brass); }
.book-repo-item.selected { border-color: var(--brass); background: rgba(187, 146, 87, 0.1); }
.book-repo-title { font-size: 0.9rem; font-weight: 700; color: var(--brass); }
.book-repo-author { font-size: 0.75rem; color: var(--parchment-dim); margin-top: 2px; }
.book-repo-count { font-size: 0.7rem; color: var(--sage); margin-top: 4px; }

@media (max-width: 1000px) {
  .app-body { grid-template-columns: 22% 6% 31% 6% 31%; }
  .app-footer { grid-template-columns: 22% 6% 31% 6% 31%; }
  .arrow-btn { height: 70px; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">

const { useState, useMemo, useCallback } = React;

// ============ DATA ============
const treeData = [
  { id: "isnad", title: "أجناس العلل التي تدور حول الإسناد", parent: null, desc: "كل علة يكون السبب فيها متعلقا بإسناد الحديث" },
  { id: "sama", title: "ما يتعلق بإبطال السماع أو نفيه", parent: "isnad", desc: "علل تتعلق بعدم ثبوت السماع بين الرواة" },
  { id: "irsal", title: "الإرسال", parent: "sama", desc: "سقوط راو من آخر الإسناد بين التابعي والنبي ﷺ" },
  { id: "tadlis", title: "التدليس", parent: "sama", desc: "رواية الراوي عمن لقيه بصيغة توهم السماع دون تصريح به" },

  { id: "ibdal", title: "ما يتعلق بإبدال الإسناد كله أو بعضه", parent: "isnad", desc: "تغيير راو بآخر في السند" },
  { id: "qalb-isnad", title: "القلب في الإسناد", parent: "ibdal", desc: "تبديل راو بآخر لانجراف الذهن إلى الطريق المشهور" },
  { id: "jadda", title: "ما كان السبب فيه سلوك الجادة", parent: "qalb-isnad", desc: "إبدال راو بآخر لانجراف الذهن إلى الطريق المشهور" },
  { id: "tashabuh", title: "تشابه الرواة والأسانيد", parent: "qalb-isnad", desc: "اشتباه راو بآخر لتقارب الاسم فيروى عنه ما ليس من روايته" },

  { id: "tahrif-sanad", title: "التحريف في السند", parent: "tashif-tahrif", desc: "تغيير الشكل (الحركات) مع بقاء صورة الخط" },
  { id: "qalb-sanad-matn", title: "القلب بين الإسناد والمتن", parent: "ibdal", desc: "إلحاق متن حديث بإسناد حديث آخر خطأ" },

  { id: "mukhalafa", title: "ما يتعلق بالمخالفة", parent: "isnad", desc: "مخالفة الرواة للمشهور" },
  { id: "shudhudh", title: "الشذوذ", parent: "mukhalafa", desc: "رواية مخالفة للثقة الأكبر" },
  { id: "ziyada-isnad", title: "الشذوذ بالزيادة في الإسناد", parent: "shudhudh", desc: "زيادة راو في السند تخالف ما كان عليه الرواية" },

  { id: "matn", title: "أجناس العلل التي تدور حول المتن", parent: null, desc: "كل علة يكون السبب فيها متعلقا بمتن الحديث" },

// ============ UTILITIES ============
function normalizeArabic(text) {
  return (text || "")
    .replace(/[\u064B-\u065F\u0670]/g, "")
    .replace(/[إأآا]/g, "ا")
    .replace(/ى/g, "ي")
    .replace(/ة/g, "ه")
    .replace(/[ؤئ]/g, "و")
    .replace(/[^\u0600-\u06FF\s]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function extractKeywords(text) {
  return normalizeArabic(text).split(" ").filter(w => w.length >= 2 && !stopWords.has(w));
}

function findCommon(arr1, arr2) {
  const set2 = new Set(arr2);
  return arr1.filter(w => set2.has(w));
}

    const matched = rule.patterns.some(p => text.includes(p));
    if (matched) {
      results[rule.node] = results[rule.node] || { score: 0, reasons: [] };
      results[rule.node].score += rule.weight;
      if (!results[rule.node].reasons.includes(rule.label)) {
        results[rule.node].reasons.push(rule.label);
      }
    }
  });

  const issueKeywords = extractKeywords(text);
  nodes.forEach(node => {
    if (!node.desc) return;
    const nodeKeywords = extractKeywords(node.desc);
    const common = findCommon(issueKeywords, nodeKeywords);
    if (common.length > 0) {
      results[node.id] = results[node.id] || { score: 0, reasons: [] };
      results[node.id].score += common.length * 5;
      results[node.id].reasons.push("تطابق دلالي مع تعريف الجنس: " + common.slice(0, 3).join("، "));
    }
  });

  Object.keys(results).forEach(nodeId => {
    const node = nodes.find(n => n.id === nodeId);
    if (node && node.parent) {
      results[node.parent] = results[node.parent] || { score: 0, reasons: [] };
      results[node.parent].score += Math.floor(results[nodeId].score * 0.3);
      if (!results[node.parent].reasons.includes("وراثة من فرع فرعي")) {
        results[node.parent].reasons.push("وراثة دلالية من فرع فرعي");
      }
    }
  });

  return Object.entries(results)
    .map(([nodeId, data]) => ({
      nodeId,
      confidence: Math.max(70, Math.min(96, data.score)),
      reasons: data.reasons,
      source: "semantic"
    }))
    .sort((a, b) => b.confidence - a.confidence);
}

function analyzeIssueToHadith(issue, hadithList) {
  if (!issue) return [];
  const issueText = (issue.matn || "") + " " + (issue.analysis || "");
  const issueKeywords = extractKeywords(issueText);
  const sahabiKeywords = extractKeywords(issue.sahabi || "");

  return hadithList.map(h => {
    const hadithText = (h.matn || "") + " " + (h.taraf || "");
    const hadithKeywords = extractKeywords(hadithText);
    const common = findCommon(issueKeywords, hadithKeywords);
    const sahabiMatch = sahabiKeywords.filter(s => hadithKeywords.includes(s));
    const tarafMatch = issue.matn && h.taraf && 
      (normalizeArabic(issue.matn).includes(normalizeArabic(h.taraf)) ||
       normalizeArabic(h.taraf).includes(normalizeArabic(issue.matn)));

    let score = common.length * 8 + sahabiMatch.length * 25;
    if (tarafMatch) score += 35;
    if (score <= 0) return null;

    const reasons = [];
    if (common.length) reasons.push("تشابه معنوي في المتن: " + common.slice(0, 3).join("، "));
    if (sahabiMatch.length) reasons.push("تطابق في اسم الصحابي أو الراوي");
    if (tarafMatch) reasons.push("تطابق في طرف الحديث");

    return {
      hadithId: h.id,
      confidence: Math.max(70, Math.min(96, score)),
      reasons,
      source: "semantic"
    };
  }).filter(Boolean).sort((a, b) => b.confidence - a.confidence);
}

function TreeNode({ node, level, selectedNode, onSelect, expandedNodes, onToggle, linkedNodes, selectedNodes, onToggleSelection }) {
  const isExpanded = expandedNodes.has(node.id);
  const isSelected = selectedNode?.id === node.id;
  const hasChildren = treeData.some(n => n.parent === node.id);
  const isLinked = linkedNodes.includes(node.id);
  const isChecked = selectedNodes.includes(node.id);

  return (
    <div className="tree-node" style={{ marginRight: `${level * 14}px` }}>
      <div className={`tree-node-content ${isSelected ? 'selected' : ''}`} onClick={() => onSelect(node)}>
        {hasChildren && (
          <span className={`tree-toggle ${isExpanded ? 'expanded' : ''}`}
            onClick={(e) => { e.stopPropagation(); onToggle(node.id); }}>
            ▶
          </span>
        )}
        {!hasChildren && <span style={{ width: 18 }} />}
        <input
          type="checkbox"
          checked={isChecked}
          onChange={(e) => { e.stopPropagation(); onToggleSelection(node.id); }}
          style={{ width: 14, height: 14, accentColor: 'var(--brass)', flexShrink: 0, marginTop: 2 }}
          onClick={(e) => e.stopPropagation()}
        />
        <div style={{ flex: 1 }}>
          <div className="tree-label">
            {isLinked && <span className="linked-badge">🔗</span>}
            {node.title}
          </div>
          {node.desc && <div className="tree-desc">{node.desc}</div>}
        </div>
      </div>
      {isExpanded && hasChildren && (
        <div>
          {treeData
            .filter(n => n.parent === node.id)
            .sort((a, b) => a.title.localeCompare(b.title))
            .map(child => (
              <TreeNode key={child.id} node={child} level={level + 1}
                selectedNode={selectedNode} onSelect={onSelect}
                expandedNodes={expandedNodes} onToggle={onToggle}
                linkedNodes={linkedNodes}
                selectedNodes={selectedNodes}
                onToggleSelection={onToggleSelection}
              />

      )}

function Dropdown({ label, items, selected, onToggle }) {
  const [open, setOpen] = useState(false);
  const ref = React.useRef();

  React.useEffect(() => {
    const handleClick = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('click', handleClick);
    return () => document.removeEventListener('click', handleClick);
  }, []);

  return (
    <div className={`dropdown ${open ? 'open' : ''}`} ref={ref}>
      <button className="dropdown-btn" onClick={() => setOpen(!open)}>
        {label} <span style={{ fontSize: '0.7rem' }}>{open ? '▲' : '▼'}</span>
      </button>
      <div className="dropdown-menu">
        {items.map(item => (
          <div key={item.id} className="dropdown-item" onClick={() => onToggle(item.id)}>
            <input type="checkbox" checked={selected.has(item.id)} onChange={() => {}} />
            <span>{item.title}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function TreeEditorModal({ isOpen, onClose, treeData: initialTree, onSave }) {
  const [nodes, setNodes] = useState(() => JSON.parse(JSON.stringify(initialTree)));
  const [editingNode, setEditingNode] = useState(null);
  const [newNodeTitle, setNewNodeTitle] = useState("");
  const [newNodeDesc, setNewNodeDesc] = useState("");
  const [newNodeParent, setNewNodeParent] = useState("");
  const [showAddForm, setShowAddForm] = useState(false);

  if (!isOpen) return null;

  const handleDelete = (nodeId) => {
    const hasChildren = nodes.some(n => n.parent === nodeId);
    if (hasChildren) {
      alert("لا يمكن حذف فرع له أفرع فرعية. احذف الأفرع أولاً.");
      return;
    }
    setNodes(prev => prev.filter(n => n.id !== nodeId));
  };

  const handleUpdate = (nodeId, title, desc) => {
    setNodes(prev => prev.map(n => n.id === nodeId ? { ...n, title, desc } : n));
    setEditingNode(null);
  };

  const handleAdd = () => {
    if (!newNodeTitle.trim()) return;
    const newId = "custom_" + Date.now();
    setNodes(prev => [...prev, {
      id: newId,
      title: newNodeTitle.trim(),
      desc: newNodeDesc.trim(),
      parent: newNodeParent || null
    }]);
    setNewNodeTitle("");
    setNewNodeDesc("");
    setNewNodeParent("");
    setShowAddForm(false);
  };

  const getNodeLevel = (nodeId) => {
    let level = 0;
    let current = nodes.find(n => n.id === nodeId);
    while (current && current.parent) {
      level++;
      current = nodes.find(n => n.id === current.parent);
    }
    return level;
  };

  const renderTreeEditor = (parentId = null, level = 0) => {
    const children = nodes.filter(n => n.parent === parentId);
    if (children.length === 0) return null;

    return children.map(node => (
      <div key={node.id} style={{ marginRight: `${level * 20}px`, marginBottom: 8, borderRight: level > 0 ? '2px solid #31413A' : 'none', paddingRight: level > 0 ? 10 : 0 }}>
        {editingNode === node.id ? (
          <div style={{ background: '#1B241F', padding: 8, borderRadius: 6, border: '1px solid #BB9257' }}>
            <input
              className="modal-input"
              defaultValue={node.title}
              id={`edit-title-${node.id}`}
              placeholder="عنوان الفرع"
            />
            <textarea
              className="modal-textarea"
              defaultValue={node.desc || ""}
              id={`edit-desc-${node.id}`}
              placeholder="وصف الفرع"
            />
            <div className="modal-actions">
              <button className="btn btn-primary" onClick={() => {
                const title = document.getElementById(`edit-title-${node.id}`).value;
                const desc = document.getElementById(`edit-desc-${node.id}`).value;
                handleUpdate(node.id, title, desc);
              }}>حفظ</button>
              <button className="btn btn-secondary" onClick={() => setEditingNode(null)}>إلغاء</button>
            </div>
          </div>
        ) : (
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '6px 8px', background: '#1B241F', borderRadius: 6 }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: '0.85rem', fontWeight: 700, color: '#F4ECDA' }}>{node.title}</div>
              {node.desc && <div style={{ fontSize: '0.7rem', color: '#B9AF95' }}>{node.desc}</div>}
            </div>
            <button className="btn btn-secondary" style={{ padding: '4px 10px', fontSize: '0.7rem' }} onClick={() => setEditingNode(node.id)}>✏️</button>
            <button className="btn btn-secondary" style={{ padding: '4px 10px', fontSize: '0.7rem', borderColor: '#8C3F35', color: '#8C3F35' }} onClick={() => handleDelete(node.id)}>🗑️</button>
          </div>
        )}
        {renderTreeEditor(node.id, level + 1)}
      </div>
    ));
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-content" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">🌳 تحرير شجرة الأجناس</div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>

        {!showAddForm ? (
          <button className="btn btn-primary" style={{ marginBottom: 12, width: '100%' }} onClick={() => setShowAddForm(true)}>
            ➕ إضافة فرع جديد
          </button>
        ) : (
          <div style={{ background: '#1B241F', padding: 12, borderRadius: 8, marginBottom: 12, border: '1px solid #31413A' }}>
            <input className="modal-input" placeholder="عنوان الفرع الجديد" value={newNodeTitle} onChange={e => setNewNodeTitle(e.target.value)} />
            <textarea className="modal-textarea" placeholder="وصف الفرع (اختياري)" value={newNodeDesc} onChange={e => setNewNodeDesc(e.target.value)} />
            <select className="modal-select" value={newNodeParent} onChange={e => setNewNodeParent(e.target.value)}>
              <option value="">بدون أب (فرع رئيسي)</option>
              {nodes.map(n => (
                <option key={n.id} value={n.id}>{n.title}</option>
              ))}
            </select>
            <div className="modal-actions">
              <button className="btn btn-primary" onClick={handleAdd}>إضافة</button>
              <button className="btn btn-secondary" onClick={() => setShowAddForm(false)}>إلغاء</button>
            </div>
          </div>
        )}

        <div style={{ maxHeight: '50vh', overflowY: 'auto' }}>
          {renderTreeEditor()}
        </div>

        <div className="modal-actions" style={{ marginTop: 16, borderTop: '1px solid #31413A', paddingTop: 12 }}>
          <button className="btn btn-primary" onClick={() => { onSave(nodes); onClose(); }}>💾 حفظ التغييرات</button>
          <button className="btn btn-secondary" onClick={onClose}>إلغاء</button>
        </div>
      </div>
    </div>
  );
}

    const a = document.createElement('a');
    a.href = url;
    a.download = `ilal_backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    resetView();
    showToast("✅ تم التصدير وإعادة الضبط");
  };

  const importData = () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          const data = JSON.parse(event.target.result);
          if (data.links) setLinks(data.links);
          if (data.treeNodes) setTreeNodes(data.treeNodes);
          if (data.customIssues) setCustomIssues(data.customIssues);
          if (data.customHadith) setCustomHadith(data.customHadith);
          resetView();
          showToast("✅ تم الاستيراد وإعادة الضبط");
        } catch (err) {
          showToast("❌ خطأ في قراءة الملف");
        }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  const resetAll = () => {
    if (confirm("هل أنت متأكد من إعادة الضبط؟ سيتم حذف جميع التغييرات والروابط المخصصة.")) {
      localStorage.clear();
      setLinks({...existingLinks});
      setTreeNodes(treeData);
      setCustomIssues([]);
      setCustomHadith([]);
      resetView();
      showToast("🔄 تم إعادة الضبط");
    }
  };

  const handleSaveTree = (newNodes) => {
    setTreeNodes(newNodes);
    localStorage.setItem('ilal-tree-nodes', JSON.stringify(newNodes));
    showToast("🌳 تم حفظ شجرة الأجناس");
  };

  const handleImportBook = (book) => {
    if (book.type === 'ilal' && book.issues) {
      const newIssues = book.issues.map((issue, idx) => ({
        ...issue,
        id: `imported_${book.id}_${idx}_${Date.now()}`,
        bookId: book.id
      }));
      setCustomIssues(prev => [...prev, ...newIssues]);
      showToast(`📥 تم إدراج ${newIssues.length} مسألة من ${book.title}`);
    } else if (book.type === 'hadith' && book.hadiths) {
      const newHadiths = book.hadiths.map((h, idx) => ({
        ...h,
        id: `imported_${book.id}_${idx}_${Date.now()}`,
        bookId: book.id
      }));
      setCustomHadith(prev => [...prev, ...newHadiths]);
      showToast(`📥 تم إدراج ${newHadiths.length} حديث من ${book.title}`);
    }
  };

  // ===== WALL 1: Tree ↔ Issues =====
  const handleNodeToIssue = () => {
    if (!selectedNode) { showToast("اختر فرعا من شجرة الأجناس أولا"); return; }
    setIsAnalyzing(true);
    setAnalysisDirection('node-to-issue');
    setShowAnalysis(true);

    setTimeout(() => {
      const results = allIssues.map(issue => {
        const analysis = analyzeIssueToNodes(issue, [selectedNode]);
        const match = analysis.find(a => a.nodeId === selectedNode.id);
        return match ? { ...match, issueId: issue.id } : null;
      }).filter(Boolean).sort((a, b) => b.confidence - a.confidence);

      setAnalysisResults(results);
      setIsAnalyzing(false);
      showToast(`تم العثور على ${results.length} مسألة مرشحة`);
    }, 800);
  };

  const handleIssueToNode = () => {
    if (!selectedIssue) { showToast("اختر مسألة أولا"); return; }
    setIsAnalyzing(true);
    setAnalysisDirection('issue-to-node');
    setShowAnalysis(true);

    setTimeout(() => {
      const results = analyzeIssueToNodes(selectedIssue, treeNodes);
      setAnalysisResults(results);
      setIsAnalyzing(false);
      showToast(`تم العثور على ${results.length} فرع مرشح في الشجرة`);
    }, 800);
  };

  // ===== WALL 2: Issues ↔ Hadith =====
  const handleIssueToHadith = () => {
    if (!selectedIssue) { showToast("اختر مسألة أولا"); return; }
    setIsAnalyzing(true);
    setAnalysisDirection('issue-to-hadith');
    setShowAnalysis(true);

    setTimeout(() => {
      const results = analyzeIssueToHadith(selectedIssue, allHadith);
      setAnalysisResults(results);
      setIsAnalyzing(false);
      showToast(`تم العثور على ${results.length} حديث مرشح`);
    }, 800);
  };

  const handleHadithToIssue = () => {
    if (!selectedHadith) { showToast("اختر حديثا أولا"); return; }
    setIsAnalyzing(true);
    setAnalysisDirection('hadith-to-issue');
    setShowAnalysis(true);

    setTimeout(() => {
      const results = allIssues.map(issue => {
        const analysis = analyzeIssueToHadith(issue, [selectedHadith]);
        return analysis.length > 0 ? { ...analysis[0], issueId: issue.id } : null;
      }).filter(Boolean).sort((a, b) => b.confidence - a.confidence);

      setAnalysisResults(results);
      setIsAnalyzing(false);
      showToast(`تم العثور على ${results.length} مسألة مرشحة`);
    }, 800);
  };

  // ===== NEW: Tree ↔ Hadith (direct) =====
  const handleNodeToHadith = () => {
    if (!selectedNode) { showToast("اختر فرعا من شجرة الأجناس أولا"); return; }
    setIsAnalyzing(true);
    setAnalysisDirection('node-to-hadith');
    setShowAnalysis(true);

    setTimeout(() => {
      // Find issues linked to this node, then find hadith linked to those issues
      const linkedIssueIds = Object.entries(links)
        .filter(([issueId, nodeIds]) => nodeIds.includes(selectedNode.id))
        .map(([issueId]) => issueId);

      const relatedHadithIds = new Set();
      linkedIssueIds.forEach(issueId => {
        const hadithLinks = links[issueId] || [];
        hadithLinks.forEach(hId => relatedHadithIds.add(hId));
      });

      const results = allHadith
        .filter(h => relatedHadithIds.has(h.id))
        .map(h => ({
          hadithId: h.id,
          confidence: 85,
          reasons: ["مرتبط بمسألة مرتبطة بفرع الشجرة المحدد"],
          source: "link"
        }));

      // Also do semantic matching
      const nodeKeywords = extractKeywords(selectedNode.title + " " + (selectedNode.desc || ""));
      allHadith.forEach(h => {
        if (results.find(r => r.hadithId === h.id)) return;
        const hadithKeywords = extractKeywords(h.matn + " " + h.taraf);
        const common = findCommon(nodeKeywords, hadithKeywords);
        if (common.length > 0) {
          results.push({
            hadithId: h.id,
            confidence: Math.min(80, 60 + common.length * 5),
            reasons: ["تشابه دلالي: " + common.slice(0, 3).join("، ")],
            source: "semantic"
          });
        }
      });

      setAnalysisResults(results.sort((a, b) => b.confidence - a.confidence));
      setIsAnalyzing(false);
      showToast(`تم العثور على ${results.length} حديث مرشح`);
    }, 800);
  };

  const handleHadithToNode = () => {
    if (!selectedHadith) { showToast("اختر حديثا أولا"); return; }
    setIsAnalyzing(true);
    setAnalysisDirection('hadith-to-node');
    setShowAnalysis(true);

    setTimeout(() => {
      // Find issues linked to this hadith, then find nodes linked to those issues
      const linkedIssueIds = Object.entries(links)
        .filter(([issueId, hadithIds]) => (hadithIds || []).includes(selectedHadith.id))
        .map(([issueId]) => issueId);

      const relatedNodeIds = new Set();
      linkedIssueIds.forEach(issueId => {
        const nodeLinks = links[issueId] || [];
        nodeLinks.forEach(nId => relatedNodeIds.add(nId));
      });

      const results = treeNodes
        .filter(n => relatedNodeIds.has(n.id))
        .map(n => ({
          nodeId: n.id,
          confidence: 85,
          reasons: ["مرتبط بمسألة مرتبطة بالحديث المحدد"],
          source: "link"
        }));

      // Also do semantic matching
      const hadithKeywords = extractKeywords(selectedHadith.matn + " " + selectedHadith.taraf);
      treeNodes.forEach(n => {
        if (results.find(r => r.nodeId === n.id)) return;
        const nodeKeywords = extractKeywords(n.title + " " + (n.desc || ""));
        const common = findCommon(hadithKeywords, nodeKeywords);
        if (common.length > 0) {
          results.push({
            nodeId: n.id,
            confidence: Math.min(80, 60 + common.length * 5),
            reasons: ["تشابه دلالي: " + common.slice(0, 3).join("، ")],
            source: "semantic"
          });
        }
      });

      setAnalysisResults(results.sort((a, b) => b.confidence - a.confidence));
      setIsAnalyzing(false);
      showToast(`تم العثور على ${results.length} فرع مرشح`);
    }, 800);
  };

  const linkNodeToIssue = (nodeId, issueId) => {
    setLinks(prev => {
      const next = { ...prev };
      if (!next[issueId]) next[issueId] = [];
      if (!next[issueId].includes(nodeId)) {
        next[issueId] = [...next[issueId], nodeId];
      }
      return next;
    });
    showToast("تم الربط بنجاح");
  };

  const linkIssueToHadith = (issueId, hadithId) => {
    setLinks(prev => {
      const next = { ...prev };
      if (!next[issueId]) next[issueId] = [];
      if (!next[issueId].includes(hadithId)) {
        next[issueId] = [...next[issueId], hadithId];
      }
      return next;
    });
    showToast("تم ربط المسألة بالحديث");
  };

  const toggleIssueSelection = (issueId) => {
    setSelectedIssues(prev => prev.includes(issueId) ? prev.filter(id => id !== issueId) : [...prev, issueId]);
  };

  const toggleNodeSelection = (nodeId) => {
    setSelectedNodes(prev => prev.includes(nodeId) ? prev.filter(id => id !== nodeId) : [...prev, nodeId]);
  };

  const toggleHadithSelection = (hadithId) => {
    setSelectedHadiths(prev => prev.includes(hadithId) ? prev.filter(id => id !== hadithId) : [...prev, hadithId]);
  };

  const linkSelected = () => {
    if (selectedNodes.length > 0 && selectedIssues.length > 0) {
      selectedIssues.forEach(issueId => {
        selectedNodes.forEach(nodeId => linkNodeToIssue(nodeId, issueId));
      });
      setSelectedIssues([]);
      setSelectedNodes([]);
    }
  };

  const renderAnalysisResults = () => {
    if (!analysisResults) return null;

    if (analysisDirection === 'node-to-issue') {
      return (
        <div>
          <div style={{ marginBottom: 10, padding: 6, background: 'rgba(92, 122, 153, 0.1)', borderRadius: 5 }}>
            <strong style={{ color: '#5C7A99', fontSize: '0.8rem' }}>📊 ترشيحات للربط بـ: {selectedNode?.title}</strong>
          </div>
          {analysisResults.map((result, idx) => {
            const issue = allIssues.find(i => i.id === result.issueId);
            if (!issue) return null;
            const isSelected = selectedIssues.includes(issue.id);
            return (
              <div key={idx} className={`item-card ${isSelected ? 'selected' : ''}`}>
                <div className="checkbox-row" onClick={() => toggleIssueSelection(issue.id)}>
                  <input type="checkbox" checked={isSelected} onChange={() => {}} />
                  <div style={{ flex: 1 }}>
                    <div className="item-number">مسألة {issue.number} - {ilalBooks.find(b => b.id === issue.bookId)?.title || 'كتاب مخصص'}</div>
                    <div className="item-text">{issue.matn.substring(0, 100)}...</div>
                    <div style={{ marginTop: 4 }}>
                      <span className={`confidence-badge ${result.confidence >= 85 ? 'conf-high' : 'conf-med'}`}>
                        ثقة: {result.confidence}%
                      </span>
                    </div>
                  </div>
                </div>
                <AnalysisPanel analysis={[{ ...result, nodeId: selectedNode.id }]} type="node" />
              </div>
            );
          })}
          {selectedIssues.length > 0 && (
            <div className="action-bar">
              <button className="btn btn-primary" onClick={linkSelected}>
                ربط {selectedIssues.length} مسألة
              </button>
            </div>
          )}
        </div>
      );
    }

    if (analysisDirection === 'issue-to-node') {
      return (
        <div>
          <div style={{ marginBottom: 10, padding: 6, background: 'rgba(92, 122, 153, 0.1)', borderRadius: 5 }}>
            <strong style={{ color: '#5C7A99', fontSize: '0.8rem' }}>📊 فروع شجرة الأجناس المرشحة لـ: مسألة {selectedIssue?.number}</strong>
          </div>
          {analysisResults.map((result, idx) => {
            const node = treeNodes.find(n => n.id === result.nodeId);
            if (!node) return null;
            const isSelected = selectedNodes.includes(node.id);
            return (
              <div key={idx} className={`item-card ${isSelected ? 'selected' : ''}`}>
                <div className="checkbox-row" onClick={() => toggleNodeSelection(node.id)}>
                  <input type="checkbox" checked={isSelected} onChange={() => {}} />
                  <div style={{ flex: 1 }}>
                    <div className="item-number">{node.title}</div>
                    <div className="item-text" style={{ fontSize: '0.75rem' }}>{node.desc}</div>
                    <div style={{ marginTop: 4 }}>
                      <span className={`confidence-badge ${result.confidence >= 85 ? 'conf-high' : 'conf-med'}`}>
                        ثقة: {result.confidence}%
                      </span>
                    </div>
                  </div>
                </div>
                <AnalysisPanel analysis={[result]} type="node" />
              </div>
            );
          })}
          {selectedNodes.length > 0 && (
            <div className="action-bar">
              <button className="btn btn-primary" onClick={linkSelected}>
                ربط بـ {selectedNodes.length} فرع
              </button>
            </div>
          )}
        </div>
      );
    }

    if (analysisDirection === 'issue-to-hadith') {
      return (
        <div>
          <div style={{ marginBottom: 10, padding: 6, background: 'rgba(92, 122, 153, 0.1)', borderRadius: 5 }}>
            <strong style={{ color: '#5C7A99', fontSize: '0.8rem' }}>📊 أحاديث مرشحة لـ: مسألة {selectedIssue?.number}</strong>
          </div>
          {analysisResults.map((result, idx) => {
            const hadith = allHadith.find(h => h.id === result.hadithId);
            if (!hadith) return null;
            const isSelected = selectedHadiths.includes(hadith.id);
            return (
              <div key={idx} className={`item-card ${isSelected ? 'selected' : ''}`}>
                <div className="checkbox-row" onClick={() => toggleHadithSelection(hadith.id)}>
                  <input type="checkbox" checked={isSelected} onChange={() => {}} />
                  <div style={{ flex: 1 }}>
                    <div className="item-number">{hadithBooks.find(b => b.id === hadith.bookId)?.title || 'كتاب مخصص'} - {hadith.number}</div>
                    <div className="item-text">{hadith.taraf}</div>
                    <div className="item-meta">{hadith.matn.substring(0, 80)}...</div>
                    <div style={{ marginTop: 4 }}>
                      <span className={`confidence-badge ${result.confidence >= 85 ? 'conf-high' : 'conf-med'}`}>
                        ثقة: {result.confidence}%
                      </span>
                    </div>
                  </div>
                </div>
                <AnalysisPanel analysis={[result]} type="hadith" />
              </div>
            );
          })}
          {selectedHadiths.length > 0 && (
            <div className="action-bar">
              <button className="btn btn-primary" onClick={() => {
                selectedHadiths.forEach(hId => linkIssueToHadith(selectedIssue.id, hId));
                setSelectedHadiths([]);
              }}>
                ربط بـ {selectedHadiths.length} حديث
              </button>
            </div>
          )}
        </div>
      );
    }

    if (analysisDirection === 'hadith-to-issue') {
      return (
        <div>
          <div style={{ marginBottom: 10, padding: 6, background: 'rgba(92, 122, 153, 0.1)', borderRadius: 5 }}>
            <strong style={{ color: '#5C7A99', fontSize: '0.8rem' }}>📊 مسائل علل مرشحة لـ: {selectedHadith?.taraf}</strong>
          </div>
          {analysisResults.map((result, idx) => {
            const issue = allIssues.find(i => i.id === result.issueId);
            if (!issue) return null;
            const isSelected = selectedIssues.includes(issue.id);
            return (
              <div key={idx} className={`item-card ${isSelected ? 'selected' : ''}`}>
                <div className="checkbox-row" onClick={() => toggleIssueSelection(issue.id)}>
                  <input type="checkbox" checked={isSelected} onChange={() => {}} />
                  <div style={{ flex: 1 }}>
                    <div className="item-number">مسألة {issue.number}</div>
                    <div className="item-text">{issue.matn.substring(0, 100)}...</div>
                    <div style={{ marginTop: 4 }}>
                      <span className={`confidence-badge ${result.confidence >= 85 ? 'conf-high' : 'conf-med'}`}>
                        ثقة: {result.confidence}%
                      </span>
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
          {selectedIssues.length > 0 && (
            <div className="action-bar">
              <button className="btn btn-primary" onClick={() => {
                selectedIssues.forEach(issueId => {
                  if (selectedNode) linkNodeToIssue(selectedNode.id, issueId);
                });
                setSelectedIssues([]);
              }}>
                ربط {selectedIssues.length} مسألة بالفرع المحدد
              </button>
            </div>
          )}
        </div>
      );
    }

    if (analysisDirection === 'node-to-hadith') {
      return (
        <div>
          <div style={{ marginBottom: 10, padding: 6, background: 'rgba(92, 122, 153, 0.1)', borderRadius: 5 }}>
            <strong style={{ color: '#5C7A99', fontSize: '0.8rem' }}>📊 أحاديث مرشحة لـ: {selectedNode?.title}</strong>
          </div>
          {analysisResults.map((result, idx) => {
            const hadith = allHadith.find(h => h.id === result.hadithId);
            if (!hadith) return null;
            const isSelected = selectedHadiths.includes(hadith.id);
            return (
              <div key={idx} className={`item-card ${isSelected ? 'selected' : ''}`}>
                <div className="checkbox-row" onClick={() => toggleHadithSelection(hadith.id)}>
                  <input type="checkbox" checked={isSelected} onChange={() => {}} />
                  <div style={{ flex: 1 }}>
                    <div className="item-number">{hadithBooks.find(b => b.id === hadith.bookId)?.title || 'كتاب مخصص'} - {hadith.number}</div>
                    <div className="item-text">{hadith.taraf}</div>
                    <div className="item-meta">{hadith.matn.substring(0, 80)}...</div>
                    <div style={{ marginTop: 4 }}>
                      <span className={`confidence-badge ${result.confidence >= 85 ? 'conf-high' : 'conf-med'}`}>
                        ثقة: {result.confidence}%
                      </span>
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
          {selectedHadiths.length > 0 && selectedIssue && (
            <div className="action-bar">
              <button className="btn btn-primary" onClick={() => {
                selectedHadiths.forEach(hId => linkIssueToHadith(selectedIssue.id, hId));
                setSelectedHadiths([]);
              }}>
                ربط بمسألة {selectedIssue.number}
              </button>
            </div>
          )}
        </div>
      );
    }

    if (analysisDirection === 'hadith-to-node') {
      return (
        <div>
          <div style={{ marginBottom: 10, padding: 6, background: 'rgba(92, 122, 153, 0.1)', borderRadius: 5 }}>
            <strong style={{ color: '#5C7A99', fontSize: '0.8rem' }}>📊 فروع شجرة مرشحة لـ: {selectedHadith?.taraf}</strong>
          </div>
          {analysisResults.map((result, idx) => {
            const node = treeNodes.find(n => n.id === result.nodeId);
            if (!node) return null;
            const isSelected = selectedNodes.includes(node.id);
            return (
              <div key={idx} className={`item-card ${isSelected ? 'selected' : ''}`}>
                <div className="checkbox-row" onClick={() => toggleNodeSelection(node.id)}>
                  <input type="checkbox" checked={isSelected} onChange={() => {}} />
                  <div style={{ flex: 1 }}>
                    <div className="item-number">{node.title}</div>
                    <div className="item-text" style={{ fontSize: '0.75rem' }}>{node.desc}</div>
                    <div style={{ marginTop: 4 }}>
                      <span className={`confidence-badge ${result.confidence >= 85 ? 'conf-high' : 'conf-med'}`}>
                        ثقة: {result.confidence}%
                      </span>
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
          {selectedNodes.length > 0 && selectedIssue && (
            <div className="action-bar">
              <button className="btn btn-primary" onClick={() => {
                selectedNodes.forEach(nId => linkNodeToIssue(nId, selectedIssue.id));
                setSelectedNodes([]);
              }}>
                ربط بمسألة {selectedIssue.number}
              </button>
            </div>
          )}
        </div>
      );
    }

    return null;
  };

  return (
    <div className="app-wrapper">
      {/* ===== HEADER ===== */}
      <header className="app-header">
        <div className="header-top">
          <div>
            <div className="app-title">أداة الربط التفاعلي — أجناس علل الحديث</div>
            <div className="app-subtitle">ربط شجرة الأجناس بمسائل العلل والأحاديث النبوية</div>
          </div>
          <div className="header-books">
            <Dropdown 
              label="كتب العلل ▼" 
              items={ilalBooks} 
              selected={activeIlalBooks} 
              onToggle={toggleIlalBook} 
            />
            <Dropdown 
              label="كتب الحديث ▼" 
              items={hadithBooks} 
              selected={activeHadithBooks} 
              onToggle={toggleHadithBook} 
            />
            <div className="issue-counter">مسائل كتاب العلل ({filteredIssues.length})</div>
          </div>
        </div>
        <div className="header-actions">
          <button className="header-btn" onClick={() => setShowTreeEditor(true)}>🌳 تحرير الشجرة</button>
          <button className="header-btn" onClick={() => setShowBookRepo(true)}>📚 مستودع الكتب</button>
          <button className="header-btn" onClick={saveData}>💾 حفظ</button>
          <button className="header-btn" onClick={exportData}>📤 تصدير</button>
          <button className="header-btn" onClick={importData}>📥 استيراد</button>
          <button className="header-btn" onClick={resetAll}>🔄 إعادة الضبط</button>
        </div>
      </header>

      {/* ===== BODY ===== */}
      <div className="app-body">
        {/* Field 1: Tree (20%) */}
        <div className="field">
          <div className="field-header">
            <div className="field-title">شجرة أجناس العلة</div>
            <div className="field-count">{treeNodes.length}</div>
          </div>
          <div className="field-content">
            {showAnalysis && (analysisDirection === 'issue-to-node' || analysisDirection === 'hadith-to-node') ? (
              renderAnalysisResults()
            ) : (
              rootNodes.map(node => (
                <TreeNode 
                  key={node.id} 
                  node={node} 
                  level={0}
                  selectedNode={selectedNode}
                  onSelect={setSelectedNode}
                  expandedNodes={expandedNodes}
                  onToggle={toggleNode}
                  linkedNodes={Object.values(links).flat()}
                  selectedNodes={selectedNodes}
                  onToggleSelection={toggleNodeSelection}
                />
              ))
            )}
          </div>
        </div>

        {/* Wall 1: Tree ↔ Issues (5%) */}
        <div className="wall">
          <button 
            className={`arrow-btn ${analysisDirection === 'node-to-issue' ? 'active' : ''}`}
            onClick={handleNodeToIssue}
            disabled={!selectedNode}
            title="ابحث مسائل تتناسب مع فرع الشجرة المحدد"
          >
            <div className="arrow-triangle left"></div>
            <span className="arrow-label">ابحث مسائلا</span>
          </button>
          <button 
            className={`arrow-btn ${analysisDirection === 'issue-to-node' ? 'active' : ''}`}
            onClick={handleIssueToNode}
            disabled={!selectedIssue}
            title="ابحث فروع شجرة تناسب المسألة المحددة"
          >
            <div className="arrow-triangle right"></div>
            <span className="arrow-label">ابحث فرعا</span>
          </button>
        </div>

        {/* Field 2: Issues (35%) */}
        <div className="field">
          <div className="field-header">
            <div className="field-title">مسائل علل الحديث</div>
            <div className="field-count">{filteredIssues.length}</div>
          </div>
          <div className="field-content">
            {isAnalyzing && (analysisDirection === 'node-to-issue' || analysisDirection === 'hadith-to-issue') && (
              <div className="ai-thinking">
                <div className="ai-dots"><span></span><span></span><span></span></div>
                <span style={{ fontSize: '0.78rem', color: '#5C7A99' }}>المساعد الذكي يحلل ويرشح...</span>
              </div>
            )}

            {showAnalysis && (analysisDirection === 'node-to-issue' || analysisDirection === 'hadith-to-issue') ? (
              renderAnalysisResults()
            ) : (
              filteredIssues.map(issue => {
                const linkedHadith = getLinkedHadith(issue.id);
                const isSelected = selectedIssue?.id === issue.id;
                return (
                  <div 
                    key={issue.id} 
                    className={`item-card ${isSelected ? 'selected' : ''}`}
                    onClick={() => setSelectedIssue(issue)}
                  >
                    <div className="item-header">
                      <div className="item-number">مسألة {issue.number}</div>
                      {linkedHadith.length > 0 && <span className="linked-badge">🔗 {linkedHadith.length}</span>}
                    </div>
                    <div className="item-text">{issue.matn}</div>
                    <div className="item-meta">{issue.sahabi}</div>
                    <AnalysisPanel analysis={analyzeIssueToNodes(issue, treeNodes)} type="node" />
                  </div>
                );
              })
            )}
          </div>
        </div>

        {/* Wall 2: Issues ↔ Hadith (5%) */}
        <div className="wall">
          <button 
            className={`arrow-btn ${analysisDirection === 'issue-to-hadith' ? 'active' : ''}`}
            onClick={handleIssueToHadith}
            disabled={!selectedIssue}
            title="ابحث أحاديث تتناسب مع المسألة المحددة"
          >
            <div className="arrow-triangle left"></div>
            <span className="arrow-label">ابحث حديثا</span>
          </button>
          <button 
            className={`arrow-btn ${analysisDirection === 'hadith-to-issue' ? 'active' : ''}`}
            onClick={handleHadithToIssue}
            disabled={!selectedHadith}
            title="ابحث مسائل علل تتناسب مع الحديث المحدد"
          >
            <div className="arrow-triangle right"></div>
            <span className="arrow-label">ابحث مسألة</span>
          </button>
        </div>

        {/* Field 3: Hadith (35%) */}
        <div className="field">
          <div className="field-header">
            <div className="field-title">الأحاديث النبوية</div>
            <div className="field-count">{filteredHadith.length}</div>
          </div>
          <div className="field-content">
            {isAnalyzing && (analysisDirection === 'issue-to-hadith' || analysisDirection === 'hadith-to-issue') && (
              <div className="ai-thinking">
                <div className="ai-dots"><span></span><span></span><span></span></div>
                <span style={{ fontSize: '0.78rem', color: '#5C7A99' }}>المساعد الذكي يحلل ويرشح...</span>
              </div>
            )}

            {showAnalysis && (analysisDirection === 'issue-to-hadith' || analysisDirection === 'hadith-to-issue') ? (
              renderAnalysisResults()
            ) : (
              filteredHadith.map(hadith => {
                const isSelected = selectedHadith?.id === hadith.id;
                return (
                  <div 
                    key={hadith.id} 
                    className={`item-card ${isSelected ? 'selected' : ''}`}
                    onClick={() => setSelectedHadith(hadith)}
                  >
                    <div className="item-header">
                      <div className="item-number">{hadithBooks.find(b => b.id === hadith.bookId)?.title || 'كتاب مخصص'}</div>
                      <div className="item-number">{hadith.number}</div>
                    </div>
                    <div className="item-text">{hadith.taraf}</div>
                    <div className="item-meta">{hadith.matn.substring(0, 120)}...</div>
                  </div>
                );
              })
            )}
          </div>
        </div>
      </div>

      {/* ===== FOOTER ===== */}
      <footer className="app-footer">
        <div className="footer-search">
          <input 
            type="text" 
            placeholder="ابحث في الأجناس..."
            value={searchTree}
            onChange={(e) => setSearchTree(e.target.value)}
          />
        </div>
        <div className="footer-wall"></div>
        <div className="footer-search">
          <input 
            type="text" 
            placeholder="ابحث في المسائل (رقم، صحابي، لفظ)..."
            value={searchIssues}
            onChange={(e) => setSearchIssues(e.target.value)}
          />
        </div>
        <div className="footer-wall"></div>
        <div className="footer-search">
          <input 
            type="text" 
            placeholder="ابحث في الأحاديث (رقم، طرف، كتاب)..."
            value={searchHadith}
            onChange={(e) => setSearchHadith(e.target.value)}
          />
        </div>
      </footer>

      {toast && <div className="toast">{toast}</div>}

      <TreeEditorModal 
        isOpen={showTreeEditor} 
        onClose={() => setShowTreeEditor(false)} 
        treeData={treeNodes}
        onSave={handleSaveTree}
      />

      <BookRepositoryModal
        isOpen={showBookRepo}
        onClose={() => setShowBookRepo(false)}
        onImportBook={handleImportBook}
      />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<IlalApp />);
</script>
</body>
</html>
